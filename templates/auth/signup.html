<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — TaskFlow</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:480px;">
    <div class="auth-logo">
      <div class="logo-icon" style="width:44px;height:44px;font-size:22px;">⚡</div>
      <span class="logo-text" style="font-size:1.4rem;">TaskFlow</span>
    </div>

    <h2 class="auth-title">Create account</h2>
    <p class="auth-subtitle">Start managing your team's work</p>

    {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-error">⚠️ {{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'signup' %}">
      {% csrf_token %}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-control" placeholder="John">
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control" placeholder="Doe">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="john_doe" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="john@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="password2" class="form-control" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
        Create Account →
      </button>
    </form>

    <hr class="divider">
    <p class="text-sm text-muted" style="text-align:center;">
      Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </p>
  </div>
</div>
</body>
</html>
