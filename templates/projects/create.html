{% extends 'base.html' %}
{% block title %}New Project — TaskFlow{% endblock %}

{% block content %}
{% with user_projects='' %}

<div class="breadcrumb">
  <a href="{% url 'project_list' %}">Projects</a>
  <span class="breadcrumb-sep">›</span>
  <span>Create New</span>
</div>

<div style="max-width:600px;">
  <div class="page-header">
    <div>
      <h1 class="page-title">New Project</h1>
      <p class="page-subtitle">Set up a workspace for your team</p>
    </div>
  </div>

  <div class="card">
    <form method="post" action="{% url 'project_create' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Project Name *</label>
        <input type="text" name="name" class="form-control" placeholder="e.g. Website Redesign" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" placeholder="What is this project about? (optional)"></textarea>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end;">
        <a href="{% url 'project_list' %}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Create Project →</button>
      </div>
    </form>
  </div>
</div>

{% endwith %}
{% endblock %}
