{% extends 'base.html' %}
{% block title %}New Task — TaskFlow{% endblock %}

{% block content %}
{% with user_projects='' %}

<div class="breadcrumb">
  <a href="{% url 'project_list' %}">Projects</a>
  <span class="breadcrumb-sep">›</span>
  <a href="{% url 'project_detail' project.pk %}">{{ project.name }}</a>
  <span class="breadcrumb-sep">›</span>
  <span>New Task</span>
</div>

<div style="max-width:640px;">
  <div class="page-header">
    <div>
      <h1 class="page-title">Create Task</h1>
      <p class="page-subtitle">in <strong>{{ project.name }}</strong></p>
    </div>
  </div>

  <div class="card">
    <form method="post" action="{% url 'task_create' project.pk %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Task Title *</label>
        <input type="text" name="title" class="form-control" placeholder="e.g. Design landing page" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" placeholder="Describe the task in detail (optional)"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select name="priority" class="form-control">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input type="date" name="due_date" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Assign To</label>
        <select name="assigned_to" class="form-control">
          <option value="">Unassigned</option>
          {% for pm in members %}
          <option value="{{ pm.user.pk }}">{{ pm.user.username }} ({{ pm.get_role_display }})</option>
          {% endfor %}
        </select>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end;">
        <a href="{% url 'project_detail' project.pk %}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Create Task →</button>
      </div>
    </form>
  </div>
</div>

{% endwith %}
{% endblock %}
