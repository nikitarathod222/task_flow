<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TaskFlow</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon" style="width:44px;height:44px;font-size:22px;">⚡</div>
      <span class="logo-text" style="font-size:1.4rem;">TaskFlow</span>
    </div>

    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-subtitle">Sign in to your workspace</p>

    {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-error">⚠️ {{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="your_username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
        Sign In →
      </button>
    </form>

    <hr class="divider">
    <p class="text-sm text-muted" style="text-align:center;">
      Don't have an account? <a href="{% url 'signup' %}">Create one</a>
    </p>
  </div>
</div>
</body>
</html>
